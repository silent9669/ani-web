name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify generated app icons
        run: npm run check:icons

      - name: Verify release tag matches project version
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: npm run check:release-version -- "$RELEASE_TAG"

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            build_args: "--target aarch64-apple-darwin --bundles app,dmg --ci"
            collect_platform: macos-aarch64
          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            build_args: "--target x86_64-apple-darwin --bundles app,dmg --ci"
            collect_platform: macos-x64
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            build_args: "--bundles nsis,wix --ci"
            collect_platform: windows-x64
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_args: "--bundles appimage,deb,rpm --ci"
            collect_platform: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux Tauri dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            rpm \
            wget

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Normalize release artifacts
        run: node scripts/collect-tauri-artifacts.mjs ${{ matrix.collect_platform }}

      - name: Upload normalized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -maxdepth 1 -type f -print | sort

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: master
          files: release-artifacts/*
          overwrite_files: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          body: |
            ## ani-desk ${{ needs.validate.outputs.version }}

            ani-desk ${{ needs.validate.outputs.version }} ships real desktop installers:

            - macOS `.dmg` app bundles for Apple Silicon and Intel
            - Windows NSIS setup and MSI installers
            - Linux AppImage, deb, and rpm packages

            The app icon is generated from `logo.png` and appears in Finder/Dock,
            Start Menu/taskbar, and Linux desktop launchers where supported.

            These v1.0 artifacts are unsigned. macOS Gatekeeper or Windows
            SmartScreen may ask you to approve the app on first launch.

  publish-homebrew-cask:
    name: Publish Homebrew cask
    needs: [validate, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ani-desk

      - uses: actions/checkout@v4
        with:
          repository: silent9669/homebrew-ani-desk
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-ani-desk

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: ani-desk/release-artifacts
          merge-multiple: true

      - name: Generate cask from release artifacts
        working-directory: ani-desk
        run: |
          ruby scripts/generate-homebrew-cask.rb \
            "${{ needs.validate.outputs.tag }}" \
            "../homebrew-ani-desk/Casks/ani-desk.rb"

      - name: Sync tap support files
        run: |
          mkdir -p homebrew-ani-desk/.github/workflows
          cp ani-desk/packaging/homebrew-tap/README.md homebrew-ani-desk/README.md
          cp ani-desk/packaging/homebrew-tap/.github/workflows/brew-test-bot.yml \
            homebrew-ani-desk/.github/workflows/brew-test-bot.yml

      - name: Commit and push cask update
        working-directory: homebrew-ani-desk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ani-desk.rb README.md .github/workflows/brew-test-bot.yml
          if git diff --cached --quiet; then
            echo "Homebrew cask is already up to date."
            exit 0
          fi
          git commit -m "Update ani-desk to ${{ needs.validate.outputs.tag }}"
          git push
