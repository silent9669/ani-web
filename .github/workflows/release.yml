name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify generated app icons
        run: npm run check:icons

      - name: Verify release tag matches project version
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: npm run check:release-version -- "$RELEASE_TAG"

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            build_args: "--target aarch64-apple-darwin --bundles app,dmg --ci"
            collect_platform: macos-aarch64
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            build_args: "--bundles nsis,msi --ci"
            collect_platform: windows-x64
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_args: "--bundles appimage,deb,rpm --ci"
            collect_platform: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux Tauri dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            rpm \
            wget

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Normalize release artifacts
        run: node scripts/collect-tauri-artifacts.mjs ${{ matrix.collect_platform }}

      - name: Upload normalized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -maxdepth 1 -type f -print | sort

      - name: Remove existing release before replacement
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ needs.validate.outputs.tag }}" --yes || true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: master
          files: release-artifacts/*
          overwrite_files: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          body: |
            ## ani-desk ${{ needs.validate.outputs.version }}

            ani-desk ${{ needs.validate.outputs.version }} ships real desktop installers:

            - macOS `.dmg` app bundle for Apple Silicon Macs on macOS 15+
            - Windows NSIS setup and MSI installers
            - Linux AppImage, deb, and rpm packages

            The app icon is generated from `logo.png` and appears in Finder/Dock,
            Start Menu/taskbar, and Linux desktop launchers where supported.

            These v1.0 artifacts are unsigned. macOS Gatekeeper or Windows
            SmartScreen may ask you to approve the app on first launch.

  verify-release-assets:
    name: Verify public release assets
    needs: [validate, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Check release download URLs
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          base="https://github.com/silent9669/ani-desk/releases/download/${TAG}"
          assets=(
            "ani-desk_${VERSION}_aarch64.dmg"
            "ani-desk_${VERSION}_aarch64.dmg.sha256"
            "ani-desk_${VERSION}_x64-setup.exe"
            "ani-desk_${VERSION}_x64-setup.exe.sha256"
            "ani-desk_${VERSION}_x64.msi"
            "ani-desk_${VERSION}_x64.msi.sha256"
            "ani-desk_${VERSION}_amd64.AppImage"
            "ani-desk_${VERSION}_amd64.AppImage.sha256"
            "ani-desk_${VERSION}_amd64.deb"
            "ani-desk_${VERSION}_amd64.deb.sha256"
            "ani-desk_${VERSION}_x86_64.rpm"
            "ani-desk_${VERSION}_x86_64.rpm.sha256"
          )

          for asset in "${assets[@]}"; do
            url="${base}/${asset}"
            for attempt in $(seq 1 12); do
              echo "Checking ${url} (attempt ${attempt}/12)"
              if curl --fail --silent --show-error --location --head "${url}" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 12 ]; then
                echo "Release asset is not publicly reachable: ${url}" >&2
                exit 1
              fi
              sleep 10
            done
          done

  publish-homebrew-cask:
    name: Publish Homebrew cask
    needs: [validate, verify-release-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ani-desk

      - uses: actions/checkout@v4
        with:
          repository: silent9669/homebrew-ani-desk
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-ani-desk

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: ani-desk/release-artifacts
          merge-multiple: true

      - name: Generate cask from release artifacts
        working-directory: ani-desk
        run: |
          ruby scripts/generate-homebrew-cask.rb \
            "${{ needs.validate.outputs.tag }}" \
            "../homebrew-ani-desk/Casks/ani-desk.rb"

      - name: Sync tap support files
        run: |
          mkdir -p homebrew-ani-desk/.github/workflows
          cp ani-desk/packaging/homebrew-tap/README.md homebrew-ani-desk/README.md
          cp ani-desk/packaging/homebrew-tap/.github/workflows/brew-test-bot.yml \
            homebrew-ani-desk/.github/workflows/brew-test-bot.yml

      - name: Commit and push cask update
        id: tap_update
        working-directory: homebrew-ani-desk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ani-desk.rb README.md .github/workflows/brew-test-bot.yml
          if git diff --cached --quiet; then
            echo "Homebrew cask is already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update ani-desk to ${{ needs.validate.outputs.tag }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger tap release validation
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run brew-test-bot.yml \
            --repo silent9669/homebrew-ani-desk \
            --ref main \
            -f full_validation=true

          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(
              gh run list \
                --repo silent9669/homebrew-ani-desk \
                --workflow "Brew Test Bot" \
                --event workflow_dispatch \
                --branch main \
                --limit 10 \
                --json databaseId,createdAt \
                --jq "[.[] | select(.createdAt >= \"${started_at}\")] | .[0].databaseId // empty"
            )"
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$run_id" ]; then
            echo "Could not find the triggered tap validation run." >&2
            exit 1
          fi

          gh run watch "$run_id" --repo silent9669/homebrew-ani-desk --exit-status --interval 15
