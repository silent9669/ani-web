name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  quality:
    name: Quality, Rust, and hosted API
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: npm ci

      - name: Validate assets and release metadata
        run: |
          npm run check:icons
          npm run check:release-version -- "v$(node -p "require('./package.json').version")"

      - name: Build responsive web client
        run: npm run build

      - name: Validate homelab deployment assets
        env:
          ANI_DESK_ENV_FILE: .env.example
        run: |
          bash -n deploy/homelab/bootstrap-host.sh
          bash -n deploy/homelab/namecheap-ddns.sh
          python tests/test_data_guard.py -v
          docker compose \
            --env-file deploy/homelab/.env.example \
            --file deploy/homelab/compose.yml \
            config --quiet
          npm run cloudflare:test

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint web server and shared core
        run: cargo clippy -p ani-desk-core -p ani-desk-server --all-targets -- -D warnings

      - name: Run web server and shared-core tests
        run: cargo test -p ani-desk-core -p ani-desk-server

      - name: Smoke-test hosted authentication and My List
        run: |
          cargo build -p ani-desk-server
          scripts/smoke-web-server.sh

  browser-e2e:
    name: Browser E2E (desktop + mobile + TV)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/e2e/requirements.txt
      - name: Cache Chromium
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e/requirements.txt') }}
      - name: Install browser test dependencies
        run: |
          npm ci
          python -m pip install -r tests/e2e/requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run UI behavior and responsive tests
        run: pytest tests/e2e/test_app.py -q

  web-container:
    name: Railway container
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Build production web image
        run: docker build --tag ani-desk-web:ci .

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Frontend audit
        run: npm audit --audit-level=high
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Rust audit
        run: cargo audit
