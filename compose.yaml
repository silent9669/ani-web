name: ani-desk

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ani-desk:local
    env_file:
      - .env.homelab
    environment:
      ANI_DESK_DATA_DIR: /data
      ANI_DESK_WEB_DIR: /app/web/dist
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
